openapi: "3.0.3"
info:
  title: App Store Connect API
  description: |
    A subset of Apple's App Store Connect API OpenAPI specification covering
    user management and device management endpoints. The full specification is
    available at https://developer.apple.com/documentation/appstoreconnectapi
  version: "3.7.1"

paths:
  /v1/users/{id}:
    get:
      operationId: getUser
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    patch:
      operationId: updateUser
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    delete:
      operationId: deleteUser
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
  /v1/userInvitations/{id}:
    get:
      operationId: getUserInvitation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInvitationResponse'
    delete:
      operationId: revokeUserInvitation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
  /v1/userInvitations:
    post:
      operationId: createUserInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInvitationCreateRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInvitationResponse'

  /v1/devices/{id}:
    get:
      operationId: getDevice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
    patch:
      operationId: updateDevice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUpdateRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
  /v1/devices:
    post:
      operationId: registerDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreateRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'

components:
  schemas:

    # Shared enum

    UserRole:
      type: string
      enum:
        - ADMIN
        - FINANCE
        - ACCOUNT_HOLDER
        - SALES
        - MARKETING
        - APP_MANAGER
        - DEVELOPER
        - ACCESS_TO_REPORTS
        - CUSTOMER_SUPPORT
        - CREATE_APPS
        - CLOUD_MANAGED_DEVELOPER_ID
        - CLOUD_MANAGED_APP_DISTRIBUTION
        - GENERATE_INDIVIDUAL_KEYS

    # Shared relationship types

    AppRelationship:
      type: object
      required: [id, type]
      properties:
        id:
          type: string
        type:
          type: string

    UserVisibleAppsRelationship:
      description: Read-only relationship to visible apps, returned in API responses.
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AppRelationship'

    UserVisibleAppsLinkages:
      description: Write relationship to visible apps, used in API requests.
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AppRelationship'

    # User response types

    UserRelationships:
      type: object
      properties:
        visibleApps:
          $ref: '#/components/schemas/UserVisibleAppsRelationship'

    UserAttributes:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        username:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
        allAppsVisible:
          type: boolean
        provisioningAllowed:
          type: boolean
        userHasAcceptedInvitation:
          type: boolean

    User:
      type: object
      required: [id, attributes]
      properties:
        id:
          type: string
        type:
          type: string
        attributes:
          $ref: '#/components/schemas/UserAttributes'
        relationships:
          $ref: '#/components/schemas/UserRelationships'

    UserResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/User'

    # User update request types

    UserUpdateRequestAttributes:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
        allAppsVisible:
          type: boolean
        provisioningAllowed:
          type: boolean

    UserUpdateRequestRelationships:
      type: object
      properties:
        visibleApps:
          $ref: '#/components/schemas/UserVisibleAppsLinkages'

    UserUpdateRequestData:
      type: object
      required: [id, type, attributes]
      properties:
        id:
          type: string
        type:
          type: string
        attributes:
          $ref: '#/components/schemas/UserUpdateRequestAttributes'
        relationships:
          $ref: '#/components/schemas/UserUpdateRequestRelationships'

    UserUpdateRequest:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/UserUpdateRequestData'

    # User invitation response types

    UserInvitationAttributes:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
        allAppsVisible:
          type: boolean
        provisioningAllowed:
          type: boolean

    UserInvitationRelationships:
      type: object
      properties:
        visibleApps:
          $ref: '#/components/schemas/UserVisibleAppsRelationship'

    UserInvitation:
      type: object
      required: [id, attributes]
      properties:
        id:
          type: string
        type:
          type: string
        attributes:
          $ref: '#/components/schemas/UserInvitationAttributes'
        relationships:
          $ref: '#/components/schemas/UserInvitationRelationships'

    UserInvitationResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/UserInvitation'

    # User invitation create request types

    UserInvitationCreateRequestAttributes:
      type: object
      required: [firstName, lastName, email, roles]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
        allAppsVisible:
          type: boolean
        provisioningAllowed:
          type: boolean

    UserInvitationCreateRequestRelationships:
      type: object
      properties:
        visibleApps:
          $ref: '#/components/schemas/UserVisibleAppsLinkages'

    UserInvitationCreateRequestData:
      type: object
      required: [type, attributes]
      properties:
        type:
          type: string
        attributes:
          $ref: '#/components/schemas/UserInvitationCreateRequestAttributes'
        relationships:
          $ref: '#/components/schemas/UserInvitationCreateRequestRelationships'

    UserInvitationCreateRequest:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/UserInvitationCreateRequestData'

    # Device enums

    DeviceClass:
      type: string
      enum:
        - APPLE_WATCH
        - IPAD
        - IPHONE
        - IPOD
        - APPLE_TV
        - APPLE_VISION_PRO
        - MAC

    BundleIdPlatform:
      type: string
      enum:
        - IOS
        - MAC_OS

    DeviceStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED

    # Device response types

    DeviceAttributes:
      type: object
      properties:
        name:
          type: string
        udid:
          type: string
        deviceClass:
          $ref: '#/components/schemas/DeviceClass'
        model:
          type: string
        os:
          type: string
        platform:
          $ref: '#/components/schemas/BundleIdPlatform'
        status:
          $ref: '#/components/schemas/DeviceStatus'
        addedDate:
          type: string
          format: date-time

    Device:
      type: object
      required: [id, attributes]
      properties:
        id:
          type: string
        type:
          type: string
        attributes:
          $ref: '#/components/schemas/DeviceAttributes'

    DeviceResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Device'

    # Device create request types

    DeviceCreateRequestAttributes:
      type: object
      required: [name, udid, platform]
      properties:
        name:
          type: string
        udid:
          type: string
        platform:
          $ref: '#/components/schemas/BundleIdPlatform'

    DeviceCreateRequestData:
      type: object
      required: [type, attributes]
      properties:
        type:
          type: string
        attributes:
          $ref: '#/components/schemas/DeviceCreateRequestAttributes'

    DeviceCreateRequest:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DeviceCreateRequestData'

    # Device update request types

    DeviceUpdateRequestAttributes:
      type: object
      properties:
        name:
          type: string
        status:
          $ref: '#/components/schemas/DeviceStatus'

    DeviceUpdateRequestData:
      type: object
      required: [id, type, attributes]
      properties:
        id:
          type: string
        type:
          type: string
        attributes:
          $ref: '#/components/schemas/DeviceUpdateRequestAttributes'

    DeviceUpdateRequest:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DeviceUpdateRequestData'
