openapi: "3.0.3"
info:
  title: App Store Connect API
  description: |
    A subset of Apple's App Store Connect API OpenAPI specification covering
    user management endpoints. The full specification is available at
    https://developer.apple.com/documentation/appstoreconnectapi
  version: "3.7.1"

paths:
  /v1/users/{id}:
    get:
      operationId: getUser
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    patch:
      operationId: updateUser
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    delete:
      operationId: deleteUser
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
  /v1/userInvitations/{id}:
    get:
      operationId: getUserInvitation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInvitationResponse'
    delete:
      operationId: revokeUserInvitation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
  /v1/userInvitations:
    post:
      operationId: createUserInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInvitationCreateRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInvitationResponse'

components:
  schemas:

    # Shared enum

    UserRole:
      type: string
      enum:
        - ADMIN
        - FINANCE
        - ACCOUNT_HOLDER
        - SALES
        - MARKETING
        - APP_MANAGER
        - DEVELOPER
        - ACCESS_TO_REPORTS
        - CUSTOMER_SUPPORT
        - CREATE_APPS
        - CLOUD_MANAGED_DEVELOPER_ID
        - CLOUD_MANAGED_APP_DISTRIBUTION
        - GENERATE_INDIVIDUAL_KEYS

    # Shared relationship types

    AppRelationship:
      type: object
      required: [id, type]
      properties:
        id:
          type: string
        type:
          type: string

    UserVisibleAppsRelationship:
      description: Read-only relationship to visible apps, returned in API responses.
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AppRelationship'

    UserVisibleAppsLinkages:
      description: Write relationship to visible apps, used in API requests.
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AppRelationship'

    # User response types

    UserRelationships:
      type: object
      properties:
        visibleApps:
          $ref: '#/components/schemas/UserVisibleAppsRelationship'

    UserAttributes:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        username:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
        allAppsVisible:
          type: boolean
        provisioningAllowed:
          type: boolean
        userHasAcceptedInvitation:
          type: boolean

    User:
      type: object
      required: [id, attributes]
      properties:
        id:
          type: string
        type:
          type: string
        attributes:
          $ref: '#/components/schemas/UserAttributes'
        relationships:
          $ref: '#/components/schemas/UserRelationships'

    UserResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/User'

    # User update request types

    UserUpdateRequestAttributes:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
        allAppsVisible:
          type: boolean
        provisioningAllowed:
          type: boolean

    UserUpdateRequestRelationships:
      type: object
      properties:
        visibleApps:
          $ref: '#/components/schemas/UserVisibleAppsLinkages'

    UserUpdateRequestData:
      type: object
      required: [id, type, attributes]
      properties:
        id:
          type: string
        type:
          type: string
        attributes:
          $ref: '#/components/schemas/UserUpdateRequestAttributes'
        relationships:
          $ref: '#/components/schemas/UserUpdateRequestRelationships'

    UserUpdateRequest:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/UserUpdateRequestData'

    # User invitation response types

    UserInvitationAttributes:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
        allAppsVisible:
          type: boolean
        provisioningAllowed:
          type: boolean

    UserInvitationRelationships:
      type: object
      properties:
        visibleApps:
          $ref: '#/components/schemas/UserVisibleAppsRelationship'

    UserInvitation:
      type: object
      required: [id, attributes]
      properties:
        id:
          type: string
        type:
          type: string
        attributes:
          $ref: '#/components/schemas/UserInvitationAttributes'
        relationships:
          $ref: '#/components/schemas/UserInvitationRelationships'

    UserInvitationResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/UserInvitation'

    # User invitation create request types

    UserInvitationCreateRequestAttributes:
      type: object
      required: [firstName, lastName, email, roles]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
        allAppsVisible:
          type: boolean
        provisioningAllowed:
          type: boolean

    UserInvitationCreateRequestRelationships:
      type: object
      properties:
        visibleApps:
          $ref: '#/components/schemas/UserVisibleAppsLinkages'

    UserInvitationCreateRequestData:
      type: object
      required: [type, attributes]
      properties:
        type:
          type: string
        attributes:
          $ref: '#/components/schemas/UserInvitationCreateRequestAttributes'
        relationships:
          $ref: '#/components/schemas/UserInvitationCreateRequestRelationships'

    UserInvitationCreateRequest:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/UserInvitationCreateRequestData'
